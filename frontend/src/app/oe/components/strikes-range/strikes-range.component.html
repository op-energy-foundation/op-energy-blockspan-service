<div class="past-strike-list">
    <div class="strike-table m-5 text-center">
        <div class="strikes-header">
            <p class="text-right results-info">Showing Maximum 15 results. If you want to see the next page, change the page URL parameter to the next page.</p>
            <div class="format-toggle">
                <button class="toggle-btn" [class.active]="format === FormatType.TABLE" (click)="switchFormat(FormatType.TABLE)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M0 2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2zm15 2h-4v3h4V4zm0 4h-4v3h4V8zm0 4h-4v3h3a1 1 0 0 0 1-1v-2zm-5 3v-3H6v3h4zm-5 0v-3H1v2a1 1 0 0 0 1 1h3zm-4-4h4V8H1v3zm0-4h4V4H1v3zm5-3v3h4V4H6zm4 4H6v3h4V8z"/>
                    </svg>
                    Table
                </button>
                <button class="toggle-btn" [class.active]="format === FormatType.WIDGET" (click)="switchFormat(FormatType.WIDGET)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M1 2.5A1.5 1.5 0 0 1 2.5 1h3A1.5 1.5 0 0 1 7 2.5v3A1.5 1.5 0 0 1 5.5 7h-3A1.5 1.5 0 0 1 1 5.5v-3zm8 0A1.5 1.5 0 0 1 10.5 1h3A1.5 1.5 0 0 1 15 2.5v3A1.5 1.5 0 0 1 13.5 7h-3A1.5 1.5 0 0 1 9 5.5v-3zm-8 8A1.5 1.5 0 0 1 2.5 9h3A1.5 1.5 0 0 1 7 10.5v3A1.5 1.5 0 0 1 5.5 15h-3A1.5 1.5 0 0 1 1 13.5v-3zm8 0A1.5 1.5 0 0 1 10.5 9h3a1.5 1.5 0 0 1 1.5 1.5v3a1.5 1.5 0 0 1-1.5 1.5h-3A1.5 1.5 0 0 1 9 13.5v-3z"/>
                    </svg>
                    Widget
                </button>
            </div>
        </div>
        <div class="content" *ngIf="!format || format === FormatType.TABLE">
            <app-data-table [headers]="headers" [data]="tableData" (rowClicked)="onChildRowClick($event)" [isLoading]="isLoading">
            </app-data-table>
        </div>
        <div *ngIf="format === FormatType.WIDGET">
            <div class="text-center loadingGraphs" *ngIf="isLoading">
                <div class="spinner-border text-light"></div>
            </div>
            <div *ngFor="let item of widgetData" class="blockspan guessing-block mb-5">
                <div class="guessing-container">
                    <app-blockrate-strike-summary-v2
                        [fromBlock]="item.fromBlock"
                        [toBlock]="item.toBlock"
                        [fromBlockHeight]="item.fromBlockHeight"
                        [toBlockHeight]="item.toBlockHeight"
                        [strikeTime]="item.strikeTime"
                        [strike]="item.strike"
                        [existingGuess]="item.existingGuess"
                        [preloaded]="item.preloaded">
                    </app-blockrate-strike-summary-v2>
                </div>
            </div>
        </div>
    </div>
</div>
